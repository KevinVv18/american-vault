<?xml version="1.0" encoding="UTF-8"?>
<!--
  American Vault — monograma A + V superpuestos.
  Construccion: dos lineas X continuas (la A y la V comparten el vertice central)
  mas la barra horizontal que completa la A.
  Trazo fino, sin relleno; el color se hereda con `currentColor` para poder
  reusar el mismo archivo en fondo claro u oscuro.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     fill="none"
     stroke="currentColor"
     stroke-width="2.2"
     stroke-linecap="square"
     stroke-linejoin="miter"
     role="img"
     aria-label="American Vault">
  <line x1="25" y1="10" x2="75" y2="90"/>
  <line x1="75" y1="10" x2="25" y2="90"/>
  <line x1="38.75" y1="68" x2="61.25" y2="68"/>
</svg>
