name: Deploy to Hostinger

# Despliega el sitio estatico al hosting por SSH + rsync cuando hay push a main.
# Misma estrategia que DAK_WP (probada, rapida, confiable).
#
# Secret requerido en GitHub (Settings > Secrets and variables > Actions):
#   SSH_PRIVATE_KEY   contenido completo de la llave privada ed25519 cuya
#                     publica esta registrada en Hostinger > SSH Access > SSH keys.
#                     Incluir las lineas BEGIN/END OPENSSH PRIVATE KEY.
#
# Ruta remota FIJA: /home/u567580447/domains/american-vault.com/public_html/
# NO tocar /home/u567580447/public_html/ ni .../domains/dakagency.net/ (son DAK).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-hostinger-american-vault
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reemplaza __BUILD_HASH__ en index.html por los primeros 7
      # caracteres del commit SHA. Hace cache-busting automatico:
      # cada deploy cambia las URLs de styles.css?v=X y app.js?v=X
      # a un valor unico, asi el browser baja la version nueva en
      # la siguiente visita sin necesidad de hard-refresh manual.
      # Combinado con .htaccess que fuerza HTML a no cachear, el
      # ciclo es: HTML fresh -> nuevas refs -> JS/CSS nuevos.
      - name: Inject build hash into HTML
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s/__BUILD_HASH__/${SHA_SHORT}/g" index.html
          echo "Cache-bust hash: ${SHA_SHORT}"
          grep -c "${SHA_SHORT}" index.html | xargs -I{} echo "Replaced {} references in index.html"

      - name: Deploy via SSH (rsync)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          # -a archivo, -v verbose, -z compresion, --delete limpia lo que no
          # este en el repo (la carpeta remota es solo para American Vault).
          switches: >-
            -avz --delete
            --exclude=.git/
            --exclude=.github/
            --exclude=.claude/
            --exclude=node_modules/
            --exclude=scripts/
            --exclude=supabase/
            --exclude=referencias/
            --exclude=carteras/
            --exclude=dist/
            --exclude=.env
            --exclude=.env.*
            --exclude=package.json
            --exclude=package-lock.json
            --exclude=README.md
            --exclude=.gitignore
            --exclude=temp_blog_html.txt
            --exclude=*.fbx
            --exclude=3D/
          path: ./
          remote_path: /home/u567580447/domains/american-vault.com/public_html/
          remote_host: 89.116.115.11
          remote_port: 65002
          remote_user: u567580447
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
