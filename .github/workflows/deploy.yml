name: Deploy to Hostinger

# Despliega el sitio estatico al hosting por SSH + rsync cuando hay push a main.
# Misma estrategia que DAK_WP (probada, rapida, confiable).
#
# Secret requerido en GitHub (Settings > Secrets and variables > Actions):
#   SSH_PRIVATE_KEY   contenido completo de la llave privada ed25519 cuya
#                     publica esta registrada en Hostinger > SSH Access > SSH keys.
#                     Incluir las lineas BEGIN/END OPENSSH PRIVATE KEY.
#
# Ruta remota FIJA: /home/u567580447/domains/american-vault.com/public_html/
# NO tocar /home/u567580447/public_html/ ni .../domains/dakagency.net/ (son DAK).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-hostinger-american-vault
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reemplaza __BUILD_HASH__ por los primeros 7 chars del commit SHA
      # en index.html Y en todos los .js del proyecto. Cache-busting
      # automatico que cubre TODOS los assets versionados:
      #   - <link href="styles.css?v=hash">       (HTML)
      #   - <script src="app.js?v=hash">          (HTML)
      #   - <script src="src/hero.js?v=hash">     (HTML)
      #   - import from './src/products.js?v=h'   (dentro del JS)
      # El ultimo es CRITICO: sin el, app.js nuevo importa products.js
      # cacheado viejo y truena por exports faltantes (passo de Fase D).
      # Combinado con .htaccess que fuerza HTML a no cachear, el ciclo
      # es: HTML fresh -> refs nuevas -> JS/CSS/imports nuevos.
      - name: Inject build hash
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          # Excluye .git/.github/node_modules/scripts donde el placeholder
          # no es relevante (y tampoco se deployan via rsync).
          find . -type f \( -name "*.html" -o -name "*.js" \) \
            -not -path "./.git/*" \
            -not -path "./.github/*" \
            -not -path "./node_modules/*" \
            -not -path "./scripts/*" \
            -exec sed -i "s/__BUILD_HASH__/${SHA_SHORT}/g" {} +
          echo "Cache-bust hash: ${SHA_SHORT}"
          echo "Files modified:"
          grep -rl "${SHA_SHORT}" --include="*.html" --include="*.js" \
            --exclude-dir=.git --exclude-dir=.github \
            --exclude-dir=node_modules --exclude-dir=scripts . || true

      - name: Deploy via SSH (rsync)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          # -a archivo, -v verbose, -z compresion, --delete limpia lo que no
          # este en el repo (la carpeta remota es solo para American Vault).
          switches: >-
            -avz --delete
            --exclude=.git/
            --exclude=.github/
            --exclude=.claude/
            --exclude=node_modules/
            --exclude=scripts/
            --exclude=supabase/
            --exclude=referencias/
            --exclude=carteras/
            --exclude=dist/
            --exclude=.env
            --exclude=.env.*
            --exclude=package.json
            --exclude=package-lock.json
            --exclude=README.md
            --exclude=.gitignore
            --exclude=temp_blog_html.txt
            --exclude=*.fbx
            --exclude=3D/
          path: ./
          remote_path: /home/u567580447/domains/american-vault.com/public_html/
          remote_host: 89.116.115.11
          remote_port: 65002
          remote_user: u567580447
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
